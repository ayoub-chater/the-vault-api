services:

  postgres:
    image: postgres:16-alpine
    container_name: vault_postgres
    environment:
      POSTGRES_DB: vault_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - vault_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d vault_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vault_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vault_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    ports:
      - "8080:8080"

  web:
    build:
      context: ../the-vault-web
      args:
        VITE_API_BASE_URL: /api
    container_name: vault_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  vault_postgres_data:
