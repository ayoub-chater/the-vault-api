spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vault_db
    username: root
    password: 
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-prod-min-32-chars}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

logging:
  level:
    com.thevault: DEBUG
    org.springframework.security: DEBUG
